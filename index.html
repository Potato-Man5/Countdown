<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="PFP_400x400.jpg" type="image/png">
    <meta charset="UTF-8">
    <title>Minecraft Live 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Minecraft-style font -->
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Minecraft', Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;

      /* Background like Minecraft Live */
      background-image: url("Minecraft_Live_March_2026_Key_Art.jpg");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }

    /* Dark overlay */
    /* .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    } */

    header {
      position: relative;
      z-index: 2;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.8rem;
      color: #ffffff;
      text-shadow: 2px 2px #000;
    }

    .nav {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    .nav span {
      cursor: pointer;
      opacity: 0.8;
    }

    .nav span:hover {
      opacity: 1;
      color: #55ff55;
    }

    .main {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .main h2 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 3px 3px #000;
    }

    .subtitle {
      color: #ffffff;
      text-shadow: 2px 2px #000;
      margin-bottom: 40px;
      padding-top: 12%;
    }

    .countdown {
      display: flex;
      gap: 25px;
      padding-top: 5%;
    }

    .time-box {
      background: rgba(0,0,0,0.7);
      border: 2px solid #55ff55;
      padding: 20px 25px;
      border-radius: 8px;
      min-width: 90px;
      box-shadow: 0 0 15px rgba(85,255,85,0.5);
    }

    .time-box div:first-child {
      font-size: 2.2rem;
    }

    .label {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 5px;
    }

    .cta {
        padding-top: 2%;
    }

    .cta button {
    background: linear-gradient(to bottom, #6fdc5a, #3c8f2f);
    border: 3px solid #2e6e25;
    padding: 14px 40px;
    font-family: 'Minecraft', sans-serif;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    text-transform: uppercase;
    padding-top: 2%;
    /* Blocky look */
    border-radius: 2px;

    /* 3D effect */
    box-shadow: 
        inset 0 2px 0 rgba(255,255,255,0.3),
        inset 0 -4px 0 rgba(0,0,0,0.3),
        0 4px 0 #1f4d1a;

    transition: all 0.1s ease-in-out;
    }

    .cta button:hover {
    filter: brightness(1.1);
    }

    .cta button:active {
    transform: translateY(3px);
    box-shadow: 
        inset 0 2px 0 rgba(255,255,255,0.3),
        inset 0 -2px 0 rgba(0,0,0,0.3),
        0 1px 0 #1f4d1a;
    }

    footer {
      position: relative;
      z-index: 2;
      padding: 15px;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
    }

    @media (max-width: 768px) {
    body {
    overflow: auto;
    background-image: url("Minecraft_Live_March_2026_Key_Art_Mobile.png");
    background-attachment: scroll;
    }

    header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .main {
        padding-top: 25%;
    }

    .main h2 {
        font-size: 2rem;
    }

    .subtitle {
        padding-top: 20px;
        font-size: 0.9rem;
    }

    .countdown {
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }

    .time-box {
        min-width: 70px;
        padding: 15px;
    }

    .time-box div:first-child {
        font-size: 1.5rem;
    }

    .cta button {
        width: 80%;
        max-width: 300px;
    }
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<header>
  <h1>MINECRAFT LIVE</h1>
  <div class="nav">
    <span>Home</span>
    <span>News</span>
  </div>
</header>

<div class="main">
  <h2>COUNTDOWN</h2>
  <div class="subtitle">Starts March 21, 1:00 AM PT</div>

  <div class="countdown">
    <div class="time-box">
      <div id="days">0</div>
      <div class="label">Days</div>
    </div>
    <div class="time-box">
      <div id="hours">0</div>
      <div class="label">Hours</div>
    </div>
    <div class="time-box">
      <div id="minutes">0</div>
      <div class="label">Minutes</div>
    </div>
    <div class="time-box">
      <div id="seconds">0</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="cta">
    <button class="link-button" onclick="openSite()">Watch Live</button>
  </div>
</div>


<script>
  const eventDate = new Date("2026-03-21T01:00:00-07:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = eventDate - now;

    if (diff <= 0) {
      document.querySelector(".main").innerHTML = "<h2>It's LIVE NOW!</h2>";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();

  function openSite() {
    window.open("https://www.youtube.com/watch?v=Is5IswM87EQ", "_blank");

    }
</script>

</body>
</html>
